    <script type="text/javascript">
      // Force correct URL without trailing slash
      if (window.location.pathname.endsWith('/') && window.location.pathname !== '/') {
        window.history.replaceState(null, null, window.location.pathname.slice(0, -1));
      }
      
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          // Remove trailing slash from pathname before adding decoded path
          var pathname = l.pathname.replace(/\/$/, '');
          window.history.replaceState(null, null,
              pathname + decoded + l.hash
          );
        }
      }(window.location))
      
      // Debug script to check if React loads
      window.addEventListener('DOMContentLoaded', function() {
        console.log('DOM loaded, checking React app...');
        setTimeout(function() {
          var root = document.getElementById('root');
          if (root && root.children.length === 0) {
            console.log('React app not loaded, redirecting to home...');
            window.location.href = '/';
          }
        }, 2000);
      });
    </script>
